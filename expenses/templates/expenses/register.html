<!-- register.html -->

{% extends 'expenses/base.html' %}

{% block header %}Create Account{% endblock %}

{% block content %}
<div class="glass-form login-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-user-plus" style="font-size: 4rem; color: var(--primary);"></i>
    </div>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-dim);">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--primary);">Sign in</a>
    </p>
</div>
{% endblock %}
