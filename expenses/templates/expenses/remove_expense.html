{% extends 'expenses/base.html' %}

{% block header %}Confirm Removal{% endblock %}

{% block content %}
<div class="glass-form">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--accent); margin-bottom: 1rem;"></i>
        <p style="font-size: 1.2rem;">Are you sure you want to delete this expense?</p>
        <div style="margin: 1.5rem 0; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--glass-border);">
            <strong>{{ expense.category }}</strong>: ${{ expense.amount }} on {{ expense.date }}
        </div>
    </div>
    <form method="post" style="box-shadow: none; background: transparent; padding: 0;">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn-primary" style="background: var(--accent);">Delete Permanently</button>
            <a href="{% url 'list_expenses' %}" class="btn-primary" style="background: var(--text-dim); text-align: center; text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
