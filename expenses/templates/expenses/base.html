<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker | Personal Finance</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'expenses/css/styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="app-wrapper">
        {% if user.is_authenticated %}
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-wallet"></i>
                <span>ExTrack</span>
            </div>
            <nav>
                <ul>
                    <li><a href="{% url 'dashboard' %}" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
                    <li><a href="{% url 'list_expenses' %}" class="nav-link"><i class="fas fa-list"></i> All Expenses</a></li>
                    <li><a href="{% url 'add_expense' %}" class="nav-link"><i class="fas fa-plus-circle"></i> Add New</a></li>
                    <li><a href="{% url 'filter_expenses' %}" class="nav-link"><i class="fas fa-filter"></i> Analytics</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <div class="user-info">
                    <span class="user-name">{{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" style="box-shadow: none; padding: 0; background: transparent; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                    </form>
                </div>
            </div>
        </aside>
        {% endif %}
        
        <main class="main-content {% if not user.is_authenticated %}full-width{% endif %}">
            <header class="top-bar">
                <h1>{% block header %}Overview{% endblock %}</h1>
            </header>
            <section class="content-area">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
    <script src="{% static 'expenses/js/scripts.js' %}"></script>
</body>
</html>
